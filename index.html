<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さが助</title>

<style>
body{
  font-family:sans-serif;
  background:#f2f2f2;
  text-align:center;
  padding:30px;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

input{
  width:90%;
  padding:12px;
  font-size:16px;
  margin-bottom:20px;
}

button{
  width:90%;
  padding:14px;
  margin:8px 0;
  font-size:16px;
  border:none;
  border-radius:6px;
  color:#fff;
}

.mercari{ background:#ea4f4f; }
.yahoo{ background:#f5c400; color:#000; }
.auction{ background:#2d66b3; }
.smart{ background:#000; }
</style>
</head>

<body>

<h1>さが助</h1>

<input id="searchBox" placeholder="検索したい文字やURLを入力">

<button class="mercari" onclick="goMercari()">メルカリ</button>
<button class="yahoo" onclick="goYahoo()">ヤフオク</button>
<button class="auction" onclick="goAuction()">オークファン</button>
<button class="smart" onclick="smartSearch()">スマート検索</button>

<script>
const siteUrl = "https://chic-sunburst-62b345.netlify.app";

async function resolveUrl(input){
  try{
    const res = await fetch(siteUrl + "/.netlify/functions/resolve?url=" + encodeURIComponent(input));
    const data = await res.json();

    if(data.asin){
      document.getElementById("searchBox").value = data.asin;
    }else{
      document.getElementById("searchBox").value = input;
    }

  }catch(e){
    document.getElementById("searchBox").value = input;
  }
}

function getQueryParam(){
  const params = new URLSearchParams(window.location.search);
  return params.get("q");
}

window.onload = function(){
  const q = getQueryParam();
  if(q){
    resolveUrl(q);
  }
};

function getValue(){
  return document.getElementById("searchBox").value;
}

function goMercari(){
  window.open("https://www.mercari.com/jp/search/?keyword=" + encodeURIComponent(getValue()),"_blank");
}

function goYahoo(){
  window.open("https://auctions.yahoo.co.jp/search/search?p=" + encodeURIComponent(getValue()),"_blank");
}

function goAuction(){
  window.open("https://aucfan.com/search1/q-" + encodeURIComponent(getValue()) + "/", "_blank");
}

function smartSearch(){
  window.open("https://www.google.com/search?q=" + encodeURIComponent(getValue()),"_blank");
}
</script>

</body>
</html>
