<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さが助</title>

<style>
body{
  font-family:sans-serif;
  background:#f2f2f2;
  text-align:center;
  padding:30px;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

input{
  width:90%;
  padding:12px;
  font-size:16px;
  margin-bottom:20px;
}

button{
  width:90%;
  padding:14px;
  margin:8px 0;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.mercari{ background:#ff4d4f; color:white; }
.yahoo{ background:#f4c542; }
.auction{ background:#3b6cb7; color:white; }
.smart{ background:black; color:white; }
</style>
</head>

<body>

<h1>さが助</h1>

<input id="searchInput" placeholder="検索したい文字やURLを入力">

<button class="mercari" onclick="goMercari()">メルカリ</button>
<button class="yahoo" onclick="goYahoo()">ヤフオク</button>
<button class="auction" onclick="goAuction()">オークファン</button>
<button class="smart" onclick="smartSearch()">スマート検索</button>

<script>
const input = document.getElementById("searchInput");

/* ================================
   URLパラメータ処理
================================ */
const params = new URLSearchParams(window.location.search);
const q = params.get("q");

if(q){
  input.value = q;
  autoResolve(q);
}

/* ================================
   入力されたら自動判定
================================ */
input.addEventListener("input", function(){
  const value = input.value.trim();
  if(value.startsWith("http")){
    autoResolve(value);
  }
});

/* ================================
   Amazon解決（短縮対応）
================================ */
function autoResolve(url){

  fetch("/.netlify/functions/resolve?q=" + encodeURIComponent(url))
  .then(res => res.json())
  .then(data => {

    if(data.asin){
      input.value = data.asin;
    }

  })
  .catch(err => {
    console.error(err);
  });

}

/* ================================
   各検索
================================ */

function goMercari(){
  const keyword = input.value.trim();
  if(!keyword) return;
  window.open("https://www.mercari.com/jp/search/?keyword=" + encodeURIComponent(keyword), "_blank");
}

function goYahoo(){
  const keyword = input.value.trim();
  if(!keyword) return;
  window.open("https://auctions.yahoo.co.jp/search/search?p=" + encodeURIComponent(keyword), "_blank");
}

function goAuction(){
  const keyword = input.value.trim();
  if(!keyword) return;
  window.open("https://aucfan.com/search1/q-" + encodeURIComponent(keyword) + "/", "_blank");
}

function smartSearch(){
  const keyword = input.value.trim();
  if(!keyword) return;

  window.open("https://www.mercari.com/jp/search/?keyword=" + encodeURIComponent(keyword), "_blank");
  window.open("https://auctions.yahoo.co.jp/search/search?p=" + encodeURIComponent(keyword), "_blank");
  window.open("https://aucfan.com/search1/q-" + encodeURIComponent(keyword) + "/", "_blank");
}

</script>

</body>
</html>
